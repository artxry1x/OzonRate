<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<style>
  body { width: 200px; padding: 15px; font-family: sans-serif; background: #f4f4f4; border-radius: 8px; margin: 0; }
  button { 
    width: 100%; padding: 10px; margin-bottom: 8px; border: none; border-radius: 5px; 
    background: #f33261; color: white; font-weight: bold; cursor: pointer; 
  }
  button:hover { background: #d92c55; }

  button.active { background: #6c757d !important; cursor: default; }
</style>
<body>
  <h3>Валюта</h3>
  <button id="EUR">EUR (€)</button>
  <button id="USD">USD ($)</button>
  <button id="RUB">RUB (₽)</button>
  <script src="popup.js"></script>
</body>
</html>
